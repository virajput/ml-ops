name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies (clean environment)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Lint with flake8
        run: flake8 src api tests data/download_data.py

      - name: Run unit tests with coverage
        run: pytest tests/ -v --cov=src/heart_disease --cov=api --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  train:
    name: Data Pipeline & Model Training
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies (clean environment)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Download & clean dataset
        run: python data/download_data.py

      - name: Run EDA
        run: python -m heart_disease.eda

      - name: Train models with MLflow tracking
        run: python -m heart_disease.train

      - name: Upload trained model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trained-models
          path: models/

      - name: Upload EDA & evaluation figures
        uses: actions/upload-artifact@v4
        with:
          name: figures
          path: reports/figures/

      - name: Upload MLflow run history
        uses: actions/upload-artifact@v4
        with:
          name: mlruns
          path: mlruns/

  docker-build-and-smoke-test:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    needs: train
    steps:
      - uses: actions/checkout@v4

      - name: Download trained model artifact
        uses: actions/download-artifact@v4
        with:
          name: trained-models
          path: models/

      - name: Build Docker image
        run: docker build -t heart-disease-api:${{ github.sha }} .

      - name: Run container and verify /health and /predict
        run: |
          docker run -d --name api-smoke-test -p 8000:8000 heart-disease-api:${{ github.sha }}
          for i in $(seq 1 15); do
            if curl -sf http://127.0.0.1:8000/health; then break; fi
            sleep 2
          done
          curl -sf http://127.0.0.1:8000/health
          echo
          curl -sf -X POST http://127.0.0.1:8000/predict \
            -H "Content-Type: application/json" \
            -d '{"age":63,"trestbps":145,"chol":233,"thalach":150,"oldpeak":2.3,"sex":1,"cp":1,"fbs":1,"restecg":2,"exang":0,"slope":3,"ca":0,"thal":6}'

      - name: Container logs
        if: always()
        run: docker logs api-smoke-test

      - name: Clean up
        if: always()
        run: docker rm -f api-smoke-test
